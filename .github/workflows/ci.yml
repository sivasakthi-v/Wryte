name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv pip install --system ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff-format)
        run: ruff format --check .

      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend (eslint + tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Tests (vitest)
        run: pnpm test
        continue-on-error: true  # No unit tests yet — will flip to required once we add them.
