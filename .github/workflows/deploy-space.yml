name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "huggingface/**"
      - ".github/workflows/deploy-space.yml"
  workflow_dispatch:

concurrency:
  group: deploy-space
  cancel-in-progress: false

jobs:
  deploy:
    name: Push to HF Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git identity
        run: |
          git config --global user.email "deploy@wryte.local"
          git config --global user.name "Wryte Deploy Bot"

      - name: Stage Space contents
        run: |
          mkdir -p /tmp/space
          # Dockerfile + README + entrypoint live at the Space root.
          cp huggingface/Dockerfile /tmp/space/Dockerfile
          cp huggingface/README.md /tmp/space/README.md
          cp huggingface/entrypoint.sh /tmp/space/entrypoint.sh
          # Backend code is copied in as-is; paths in Dockerfile reference backend/.
          mkdir -p /tmp/space/backend
          cp -r backend/app /tmp/space/backend/app
          cp backend/pyproject.toml /tmp/space/backend/pyproject.toml
          # pyproject.toml declares README.md as the project readme, so it must ship too.
          cp backend/README.md /tmp/space/backend/README.md
          # Mirror the Dockerfile's expected structure.
          mkdir -p /tmp/space/huggingface
          cp huggingface/entrypoint.sh /tmp/space/huggingface/entrypoint.sh
          # Helpful artifacts list for debugging.
          ls -R /tmp/space

      - name: Push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}   # e.g. "username/wryte"
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "::error::HF_TOKEN or HF_SPACE secret is not set. Skipping deploy."
            exit 1
          fi
          cd /tmp/space
          git init -b main
          git remote add space "https://USER:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git add -A
          git commit -m "Deploy from ${GITHUB_SHA::7}"
          git push --force space main
