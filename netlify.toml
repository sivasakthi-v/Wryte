[build]
  base = "frontend"
  command = "npm run build"
  # Publish path is relative to `base`, so ".next" resolves to frontend/.next.
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js plugin handles SSR/ISR routing on Netlify.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# API base URL points at the Hugging Face Space runtime for the Wryte backend.
# Override per-context in the Netlify dashboard if you later move the API elsewhere.

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://sivaserafino-wryte.hf.space"

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = "https://sivaserafino-wryte.hf.space"

[context.branch-deploy.environment]
  NEXT_PUBLIC_API_URL = "https://sivaserafino-wryte.hf.space"
